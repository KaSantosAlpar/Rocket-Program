<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<title>BadIdeaDex ☢️</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/roleta.css">
<link rel="stylesheet" href="css/cards.css">

</head>

<body class="bg-dark text-light">

<div class="container text-center mt-5">

<h1 class="mb-4 neon-title">☢️ BadIdeaDex</h1>

<div id="areaRoleta">

<div class="roleta-container">

<div class="seta-roleta"></div>

<div id="roleta"></div>

</div>

<button class="btn btn-danger mt-4" onclick="girar()">
GIRAR ROLETAAAAA
</button>

</div>

<hr class="my-5">

<button class="btn btn-outline-light" onclick="abrirExplorar()">
Explorar ideias
</button>

<div id="areaExplorar" style="display:none">

<select id="filtroCategoria"
onchange="filtrarIdeias()"
class="form-select w-25 mx-auto mt-4">

<option value="todas">Todas</option>
<option value="Cocô de Ideia">Cocô de Ideia</option>
<option value="Ideia Estúpida">Ideia Estúpida</option>
<option value="Baita Ideia Burra">Baita Ideia Burra</option>
<option value="Ideia de Jerico">Ideia de Jerico</option>

</select>

<div id="areaCards" class="row mt-4"></div>

<button class="btn btn-secondary mt-4" onclick="voltarRoleta()">
Voltar
</button>

</div>

</div>

<div class="modal fade" id="modalIdeia">

<div class="modal-dialog modal-lg">

<div class="modal-content bg-dark text-light">

<div class="modal-body" id="modalBody"></div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/ideias.js"></script>
<script src="js/roleta.js"></script>
<script src="js/explorar.js"></script>

</body>
</html>
