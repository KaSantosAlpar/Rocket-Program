<!DOCTYPE html>
<html lang="pt-BR" ng-app="EscolaApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏫 Cadastro Escolar - AngularJS</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body ng-controller="AppController">

    <header class="header">
        <div class="container">
            <h1 ng-bind="mensagem"></h1>
        </div>
    </header>

    <main class="container">
        <section class="usuario-section">
            <div class="card">
                <div class="usuario-info">
                    <div class="avatar">
                        <img ng-if="usuario.tipo === 'Aluno'" src="https://img.icons8.com/fluency/96/student-female.png"
                            alt="Aluno">
    
                        <img ng-if="usuario.tipo === 'Professor'" src="https://img.icons8.com/fluency/96/teacher.png"
                            alt="Professor">
    
                        <img ng-if="!usuario.tipo" src="https://img.icons8.com/fluency/96/user-not-found.png" alt="Vazio">
                    </div>
    
                    <div class="info">
                        <h3>{{ usuario.nome }}</h3>
                        <p><strong>Tipo:</strong> <span ng-bind="usuario.tipo"></span></p>
                    </div>
                </div>

                <div class="botoes">
                    <button ng-click="definirAluno()" class="btn btn-aluno">👨‍🎓 Aluno</button>
                    <button ng-click="definirProfessor()" class="btn btn-professor">👨‍🏫 Professor</button>
                    <button ng-click="limparUsuario()" class="btn btn-limpar">🗑️ Limpar</button>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>Desenvolvido com <strong>AngularJS</strong> - Alpar Rocket Program</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
