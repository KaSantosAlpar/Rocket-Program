<!DOCTYPE html>
<html lang="pt-BR" ng-app="EscolaApp">
<head>
    <meta charset="UTF-8">
    <title>🏫 Sistema Escolar Pro - Alpar</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body ng-controller="AppController as app">

    <header class="header">
        <h1 ng-bind="app.mensagem"></h1>
        <div class="stats">
            <span>Alunos: {{ (app.usuarios | filter:{tipo:'Aluno'}).length }}</span> | 
            <span>Professores: {{ (app.usuarios | filter:{tipo:'Professor'}).length }}</span>
        </div>
    </header>

    <main class="container" ng-controller="ListaUsuariosController as lista">
        <div class="filtros">
            <input type="text" ng-model="lista.filtroNome" placeholder="🔍 Buscar por nome...">
            <select ng-model="lista.filtroTipo">
                <option value="">Todos os tipos</option>
                <option value="Aluno">Apenas Alunos</option>
                <option value="Professor">Apenas Professores</option>
            </select>
        </div>

        <div class="grid">
            <div class="card" 
                 ng-repeat="u in app.usuarios | filter:lista.filtroNome | filter:{tipo:lista.filtroTipo} | orderBy:'nome'"
                 ng-click="lista.selecionar(u)"
                 ng-class="{'selecionado': lista.usuarioSelecionado === u}">
                
                <img ng-if="u.tipo === 'Aluno'" src="https://img.icons8.com/color/64/student-male.png">
                <img ng-if="u.tipo === 'Professor'" src="https://img.icons8.com/color/64/teacher.png">
                
                <h3>{{ u.nome | uppercase }}</h3>
                <p>{{ u.tipo }} - Desde: {{ u.dataCadastro | date:'dd/MM/yyyy' }}</p>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
