<!DOCTYPE html>
<html ng-app="appCadastro">
<head>
    <meta charset="UTF-8">
    <title>Desafio 7 - Cadastro de Usuários</title>

    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>

    <style>
        .erro { color: red; font-size: 12px; margin-top: 5px; }
        .sucesso { color: green; font-weight: bold; }
        .carregando { color: blue; font-style: italic; }

        button[disabled] { opacity: 0.6; cursor: not-allowed; }

        form {
            max-width: 400px;
            margin: 20px auto;
            padding: 20px;
        }

        input, select {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
            box-sizing: border-box;
        }
    </style>
</head>

<body>

<div ng-controller="CadastroController as ctrl">
    <h2>Cadastro de Usuário</h2>

    <form name="formUsuario" ng-submit="ctrl.salvar()" novalidate>

        <!-- Nome -->
        <label>Nome *</label>
        <input type="text"
               name="nome"
               ng-model="ctrl.usuario.nome"
               required
               ng-minlength="2">

        <div class="erro" ng-show="formUsuario.nome.$touched && formUsuario.nome.$error.required">
            Nome é obrigatório
        </div>

        <div class="erro" ng-show="formUsuario.nome.$touched && formUsuario.nome.$error.minlength">
            Nome deve ter pelo menos 2 caracteres
        </div>

        <br>

        <!-- Email -->
        <label>Email *</label>
        <input type="email"
               name="email"
               ng-model="ctrl.usuario.email"
               required>

        <div class="erro" ng-show="formUsuario.email.$touched && formUsuario.email.$error.required">
            Email é obrigatório
        </div>

        <div class="erro" ng-show="formUsuario.email.$touched && formUsuario.email.$error.email">
            Email inválido
        </div>

        <br>

        <!-- Tipo -->
        <label>Tipo *</label>
        <select name="tipo"
                ng-model="ctrl.usuario.tipo"
                required>
            <option value="">Selecione...</option>
            <option value="Aluno">Aluno</option>
            <option value="Professor">Professor</option>
        </select>

        <div class="erro" ng-show="formUsuario.tipo.$touched && formUsuario.tipo.$error.required">
            Selecione um tipo
        </div>

        <br>

        <!-- Botão -->
        <button type="submit"
                ng-disabled="formUsuario.$invalid || ctrl.salvando">
            {{ctrl.salvando ? 'Carregando...' : 'Cadastrar'}}
        </button>

    </form>

    <!-- Mensagem -->
    <div ng-show="ctrl.mensagem"
         ng-class="{'sucesso': ctrl.sucesso, 'carregando': ctrl.salvando, 'erro': !ctrl.sucesso}">
        {{ctrl.mensagem}}
    </div>

    <!-- Lista -->
    <h3>Usuários Cadastrados ({{ctrl.usuarios.length}})</h3>
    <ul>
        <li ng-repeat="user in ctrl.usuarios track by $index">
            {{user.nome}} - {{user.email}} ({{user.tipo}})
        </li>
    </ul>
</div>

<script>
angular.module('appCadastro', [])

// SERVICE
.service('UsuarioService', function($q, $timeout) {

    this.salvar = function(usuario) {
        var deferred = $q.defer();

        $timeout(function() {

            if (Math.random() < 0.1) {
                deferred.reject('Erro no servidor!');
            } else {
                deferred.resolve(usuario);
            }

        }, 2000);

        return deferred.promise;
    };

})

// CONTROLLER
.controller('CadastroController', function($scope, UsuarioService) {

    var ctrl = this;

    ctrl.usuarios = [];
    ctrl.usuario = {};
    ctrl.salvando = false;
    ctrl.mensagem = '';
    ctrl.sucesso = false;

    ctrl.salvar = function() {

        if ($scope.formUsuario.$invalid) return;

        ctrl.salvando = true;
        ctrl.mensagem = 'Salvando usuário...';
        ctrl.sucesso = false;

        UsuarioService.salvar(ctrl.usuario)

            .then(function(usuarioSalvo) {

                ctrl.usuarios.push(angular.copy(usuarioSalvo));

                ctrl.mensagem = 'Usuário cadastrado com sucesso!';
                ctrl.sucesso = true;

                // limpa formulário
                ctrl.usuario = {};
                $scope.formUsuario.$setPristine();
                $scope.formUsuario.$setUntouched();
            })

            .catch(function(erro) {

                ctrl.mensagem = erro || 'Erro ao cadastrar usuário!';
                ctrl.sucesso = false;

            })

            .finally(function () {
                ctrl.salvando = false;
            });
    };

});
</script>

</body>
</html>
