<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔍 Validador Regex - Desafio 9</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #2d3748;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #4a5568;
        }

        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        input.valido {
            border-color: #48bb78;
            background: #f0fff4;
        }

        input.invalido {
            border-color: #f56565;
            background: #fff5f5;
        }

        .status {
            margin-top: 8px;
            font-size: 14px;
            font-weight: 500;
            min-height: 20px;
        }

        .valido-status {
            color: #48bb78;
        }

        .invalido-status {
            color: #f56565;
        }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(72, 187, 120, 0.3);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .resultado {
            margin-top: 20px;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            font-weight: 600;
        }

        .sucesso {
            background: #c6f6d5;
            color: #22543d;
            border: 2px solid #9ae6b4;
        }

        .erro {
            background: #fed7d7;
            color: #742a2a;
            border: 2px solid #fc8181;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1> Validador Regex</h1>
        
        <form id="formValidacao">
            <!-- Nome -->
            <div class="form-group">
                <label for="nome">Nome (apenas letras e espaços)</label>
                <input type="text" id="nome" name="nome" placeholder="João Silva">
                <div class="status" id="status-nome"></div>
            </div>

            <!-- Email -->
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="joao@email.com">
                <div class="status" id="status-email"></div>
            </div>

            <!-- CPF -->
            <div class="form-group">
                <label for="cpf">CPF (000.000.000-00)</label>
                <input type="text" id="cpf" name="cpf" placeholder="123.456.789-00" maxlength="14">
                <div class="status" id="status-cpf"></div>
            </div>

            <button type="submit" id="btnValidar"> Validar Dados</button>
        </form>

        <div id="resultado"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
