<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel | Tech & Coffee</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
font-family:'Segoe UI', sans-serif;
}

/* NAVBAR */
.navbar{
background: rgba(0,0,0,0.7);
backdrop-filter: blur(10px);
}

/* CARDS */
.card{
background: rgba(255,255,255,0.05);
border:none;
border-radius:15px;
backdrop-filter: blur(10px);
transition:0.4s;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 15px 40px rgba(0,0,0,0.5);
}

/* ÍCONE */
.icon{
font-size:40px;
}

</style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container">
    <a class="navbar-brand fw-bold" href="#">☕ Painel Tech & Coffee</a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse justify-content-end" id="menu">
      <ul class="navbar-nav">

        <li class="nav-item">
          <a class="nav-link" href="#">Dashboard</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="#">
            Notificações 
            <span class="badge bg-danger">3</span>
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="#">Perfil</a>
        </li>

      </ul>
    </div>
  </div>
</nav>

<!-- ALERTA -->
<div class="container mt-4">
  <div class="alert alert-success">
    ✅ Bem-vinda ao painel, Kariny!
  </div>
</div>

<!-- CARDS -->
<section class="container mt-4">

  <div class="row g-4">

    <!-- CARD 1 -->
    <div class="col-md-4">
      <div class="card p-4 text-center">
        <div class="icon">☕</div>
        <h5 class="mt-3">Pedidos</h5>
        <p class="text-light">Gerencie os pedidos da cafeteria</p>
        <button class="btn btn-primary">Acessar</button>
      </div>
    </div>

    <!-- CARD 2 -->
    <div class="col-md-4">
      <div class="card p-4 text-center">
        <div class="icon">📊</div>
        <h5 class="mt-3">Relatórios</h5>
        <p class="text-light">Visualize dados e desempenho</p>
        <button class="btn btn-primary">Ver dados</button>
      </div>
    </div>

    <!-- CARD 3 -->
    <div class="col-md-4">
      <div class="card p-4 text-center">
        <div class="icon">👥</div>
        <h5 class="mt-3">Clientes</h5>
        <p class="text-light">Gerencie seus clientes</p>
        <button class="btn btn-primary">Gerenciar</button>
      </div>
    </div>

  </div>

</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
