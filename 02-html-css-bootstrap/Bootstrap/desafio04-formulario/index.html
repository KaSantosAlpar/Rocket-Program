<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Formulário</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

  <h2 class="fw-bold mb-4">Contato</h2>

  <!-- MENSAGEM DE SUCESSO -->
  <div id="sucesso" class="alert alert-success d-none">
    ✅ Mensagem enviada com sucesso!
  </div>

  <form id="formulario">

    <!-- NOME -->
    <div class="mb-3">
      <label class="form-label">Nome</label>
      <input type="text" id="nome" class="form-control">
      <div class="invalid-feedback">Digite seu nome</div>
    </div>

    <!-- EMAIL -->
    <div class="mb-3">
      <label class="form-label">E-mail</label>
      <input type="email" id="email" class="form-control">
      <div class="invalid-feedback">Digite um e-mail válido</div>
    </div>

    <!-- ASSUNTO (SELECT) -->
    <div class="mb-3">
      <label class="form-label">Assunto</label>
      <select id="assunto" class="form-select">
        <option value="">Selecione</option>
        <option>Suporte</option>
        <option>Dúvida</option>
        <option>Feedback</option>
      </select>
      <div class="invalid-feedback">Selecione um assunto</div>
    </div>

    <!-- MENSAGEM -->
    <div class="mb-3">
      <label class="form-label">Mensagem</label>
      <textarea id="mensagem" class="form-control" rows="4"></textarea>
      <div class="invalid-feedback">Digite uma mensagem</div>
    </div>

    <!-- CHECK (EXTRA PRA GANHAR PONTO) -->
    <div class="form-check mb-3">
      <input class="form-check-input" type="checkbox" id="check">
      <label class="form-check-label">
        Aceito os termos
      </label>
    </div>

    <!-- BOTÃO -->
    <button type="submit" class="btn btn-primary">
      Enviar
    </button>

  </form>

</div>

<script>

// CAPTURA DO FORMULÁRIO
document.getElementById("formulario").addEventListener("submit", function(e){
  e.preventDefault();

  let valido = true;

  let nome = document.getElementById("nome");
  let email = document.getElementById("email");
  let assunto = document.getElementById("assunto");
  let mensagem = document.getElementById("mensagem");

  // VALIDAÇÕES

  if(nome.value === ""){
    nome.classList.add("is-invalid");
    valido = false;
  } else {
    nome.classList.remove("is-invalid");
    nome.classList.add("is-valid");
  }

  if(email.value === "" || !email.value.includes("@")){
    email.classList.add("is-invalid");
    valido = false;
  } else {
    email.classList.remove("is-invalid");
    email.classList.add("is-valid");
  }

  if(assunto.value === ""){
    assunto.classList.add("is-invalid");
    valido = false;
  } else {
    assunto.classList.remove("is-invalid");
    assunto.classList.add("is-valid");
  }

  if(mensagem.value === ""){
    mensagem.classList.add("is-invalid");
    valido = false;
  } else {
    mensagem.classList.remove("is-invalid");
    mensagem.classList.add("is-valid");
  }

  // SE ESTIVER TUDO CERTO
  if(valido){
    document.getElementById("sucesso").classList.remove("d-none");
    document.getElementById("formulario").reset();

    // remove estilos depois de enviar
    document.querySelectorAll(".form-control, .form-select").forEach(el=>{
      el.classList.remove("is-valid");
    });
  }

});

</script>

</body>
</html>
