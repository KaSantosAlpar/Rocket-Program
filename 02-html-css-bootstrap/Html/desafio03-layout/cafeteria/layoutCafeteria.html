<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Menu | Tech & Coffee</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
font-family:'Segoe UI', sans-serif;
background: linear-gradient(135deg,#136b3f,#39ad4d,#2c5364);
color:white;
}

/* NAVBAR */
.navbar{
background: rgba(0,0,0,0.7);
backdrop-filter: blur(10px);
}

/* CARD */
.card{
background: rgba(255, 255, 255, 0.05);
border:none;
border-radius:15px;
overflow:hidden;
backdrop-filter: blur(10px);
transition:0.4s;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 15px 40px rgba(0,0,0,0.5);
}

/* IMAGEM */
.card img{
height:180px;
object-fit:cover;
}

/* PREÇO */
.preco{
color:#01213a;
font-weight:bold;
}

/* FOOTER */
footer{
background:black;
padding:20px;
text-align:center;
margin-top:50px;
}

</style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
  <div class="container">
    <a class="navbar-brand fw-bold" href="siteEmpresa.html">☕ Tech & Coffee</a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse justify-content-end" id="menu">
      <ul class="navbar-nav">
        <li class="nav-item"><a class="nav-link" href="siteEmpresa.html">Início</a></li>
        <li class="nav-item"><a class="nav-link active" href="layoutCafeteria.html">Menu</a></li>
        <li class="nav-item"><a class="nav-link" href="contato.html">Contato</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- TÍTULO -->
<div class="container text-center" style="margin-top:100px;">
  <h1 class="fw-bold">Nosso Menu</h1>
  <p class="text-light">Escolha seu favorito ☕</p>
</div>

<!-- PRODUTOS -->
<section class="container py-5">

  <div class="row g-4" id="produtos"></div>

</section>

<!-- HORÁRIOS -->
<section class="container py-5">

  <h2 class="text-center mb-4">Horários</h2>

  <div class="table-responsive">
    <table class="table table-bordered table-hover text-center text-light">

      <thead>
        <tr>
          <th>Período</th>
          <th>Seg</th><th>Ter</th><th>Qua</th><th>Qui</th>
          <th>Sex</th><th>Sáb</th><th>Dom</th>
        </tr>
      </thead>

      <tbody>
        <tr>
          <td><strong>Manhã</strong></td>
          <td>08-12</td><td>Fechado</td><td>08-12</td><td>08-12</td>
          <td>08-12</td><td>08-12</td><td>08-12</td>
        </tr>

        <tr>
          <td><strong>Tarde</strong></td>
          <td>14-18</td><td>14-18</td><td>14-18</td><td>14-18</td>
          <td>14-18</td><td>14-18</td><td>Fechado</td>
        </tr>
      </tbody>

    </table>
  </div>

</section>

<!-- FOOTER -->
<footer>
  <p class="text-muted">Rua dos Devs, 1024 • Tech & Coffee</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>

  // LISTA DE PRODUTOS
  const produtos = [
    {
      nome: "Expresso",
      desc: "Grãos 100% Arábica",
      preco: "R$ 8,00",
      img: "./assets/expresso.png"
    },

    {
      nome: "Cappuccino",
      desc: "Com leite vaporizado",
      preco: "R$ 14,00",
      img: "./assets/cappuccino.png"
    },

    {
      nome: "Latte",
      desc: "Suave e cremoso",
      preco: "R$ 12,00",
      img: "./assets/latte.png"
    },

    {
      nome: "Pão de Queijo",
      desc: "Recheado com queijo",
      preco: "R$ 10,00",
      img: "./assets/pao-de-queijo.png"
    },

    {
      nome: "Quiche",
      desc: "Alho poró",
      preco: "R$ 16,00",
      img: "./assets/quiche.png"
    },

    {
      nome: "Brownie",
      desc: "Chocolate 70%",
      preco: "R$ 12,00",
      img: "./assets/brownie.png"
    },

    {
      nome: "Torta de Limão",
      desc: "Creme natural",
      preco: "R$ 14,00",
      img: "./assets/torta-de-limao.png"
    },

    {
      nome: "Croissant",
      desc: "Manteiga artesanal",
      preco: "R$ 9,00",
      img: "./assets/croissant.png"
    }
];

const area = document.getElementById("produtos");

// CRIA CARDS AUTOMATICAMENTE
produtos.forEach(p => {

area.innerHTML += `
<div class="col-md-3">
  <div class="card">
   <img src="${p.img}" alt="${p.nome}">
    <div class="card-body">
      <h5>${p.nome}</h5>
      <p class="text-muted">${p.desc}</p>
      <span class="preco">${p.preco}</span>
    </div>
  </div>
</div>
`


});


</script>

</body>
</html>
