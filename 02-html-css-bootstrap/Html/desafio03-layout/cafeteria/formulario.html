<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contato | Tech & Coffee</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* FUNDO PADRÃO DO SITE */
body{
font-family:'Segoe UI', sans-serif;
background: linear-gradient(135deg,#1aaa67,#358843,#2c5364);
color:white;
}

/* NAVBAR (MESMA DA HOME) */
.navbar{
background: rgba(0,0,0,0.7);
backdrop-filter: blur(10px);
}

/* TÍTULO */
.titulo{
margin-top:100px;
text-align:center;
}

/* FORMULÁRIO */
.form-custom{
background: rgba(255,255,255,0.05);
padding:30px;
border-radius:15px;
backdrop-filter: blur(10px);
border:1px solid rgba(255,255,255,0.1);
}

/* INPUTS */
.form-control{
background: rgba(255,255,255,0.1);
border:none;
color:white;
}

.form-control::placeholder{
color:#ccc;
}

/* BOTÃO */
.btn-custom{
background: linear-gradient(90deg,#19d0d6,#054a5f);
border:none;
color:white;
}

/* MAPA */
.mapa img{
width:100%;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

/* FOOTER */
footer{
background:black;
padding:20px;
text-align:center;
margin-top:50px;
}

</style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
  <div class="container">
    <a class="navbar-brand fw-bold" href="index.html">☕ Tech & Coffee</a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse justify-content-end" id="menu">
      <ul class="navbar-nav">
        <li class="nav-item"><a class="nav-link" href="index.html">Início</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Menu</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Sobre</a></li>
        <li class="nav-item"><a class="nav-link active" href="#">Contato</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- TÍTULO -->
<div class="titulo">
  <h1 class="fw-bold">Entre em Contato</h1>
  <p class="text-light">Fale com a gente ☕</p>
</div>

<!-- CONTEÚDO -->
<section class="container py-5">

  <div class="row g-5 align-items-center">

    <!-- FORMULÁRIO -->
    <div class="col-md-6">
      <div class="form-custom">

        <h4 class="mb-3">Contato</h4>

        <input type="text" class="form-control mb-3" placeholder="Seu nome">
        <input type="email" class="form-control mb-3" placeholder="Seu email">

        <select class="form-control mb-3">
          <option>Selecione o assunto</option>
          <option>Dúvida</option>
          <option>Pedido</option>
          <option>Feedback</option>
        </select>

        <textarea class="form-control mb-3" rows="4" placeholder="Digite sua mensagem"></textarea>

        <button class="btn btn-custom w-100">Enviar</button>

      </div>
    </div>

    <!-- MAPA / CONTATO -->
    <div class="col-md-6 text-center mapa">

      <img src="mapa.png" alt="Mapa">

      <p class="mt-3">📍 Rua dos Devs, 1024</p>
      <p>📞 (41) 99999-9999</p>
      <p>✉ contato@techcoffee.com</p>

    </div>

  </div>

</section>

<!-- FOOTER -->
<footer>
  <p class="text-muted">© 2026 Tech & Coffee</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
